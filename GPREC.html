<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Welcome to GPREC</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #004aad, #00b4d8);
            font-family: Arial, sans-serif;
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        h1 {
            color: #004aad;
            margin-bottom: 25px;
        }

        button {
            background-color: #ffb703;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #fb8500;
            transform: scale(1.05);
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Welcome to GPREC</h1>

        <button onclick="showMessage()">
            Press Here
        </button>
    </div>

    <script>
        function showMessage() {
            alert("🎉 You are now a GPRECian!");
        }
    </script>

</body>

</html>
